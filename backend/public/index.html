<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-nav-bg: #1e293b;
      --color-nav-text: #f1f5f9;
      --color-accent: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    #app { display: none; }
    #login-screen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--color-nav-bg);
    }
    .login-card {
      background: #fff; border-radius: 12px; padding: 2.5rem 2rem;
      width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .login-card p { color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .login-card input {
      width: 100%; padding: 0.65rem 0.9rem; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: 1rem; margin-bottom: 1rem;
    }
    .btn-primary {
      width: 100%; padding: 0.7rem; background: var(--color-primary);
      color: #fff; border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; font-weight: 600;
    }
    .btn-primary:hover { background: var(--color-primary-dark); }
    .btn-google {
      width: 100%; padding: 0.7rem; background: #fff; color: #374151;
      border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem;
      cursor: pointer; margin-top: 0.75rem; font-weight: 500;
    }
    .divider { text-align: center; color: #9ca3af; margin: 0.75rem 0; font-size: 0.85rem; }
    nav {
      background: var(--color-nav-bg); color: var(--color-nav-text);
      padding: 0 1.5rem; display: flex; align-items: center;
      justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .trade-badge {
      font-size: 0.65rem; background: var(--color-accent); color: #1e293b;
      padding: 2px 8px; border-radius: 99px; font-weight: 700; letter-spacing: 0.05em;
    }
    .nav-links { display: flex; gap: 1.5rem; font-size: 0.9rem; }
    .nav-links a { color: #94a3b8; text-decoration: none; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-size: 0.85rem; color: #94a3b8; }
    .btn-logout { background: none; border: 1px solid #475569; color: #94a3b8;
      border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    h2 { font-size: 1.4rem; margin-bottom: 1.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: #fff; border-radius: 10px; padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid var(--color-primary);
    }
    .stat-card .label { font-size: 0.8rem; color: #64748b; margin-bottom: 0.25rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--color-primary); }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; }
    .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 1rem; font-weight: 600; }
    .btn-sm { padding: 0.4rem 0.9rem; background: var(--color-primary); color: #fff;
      border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem 1.5rem; text-align: left; font-size: 0.875rem; }
    th { background: #f8fafc; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    td { border-bottom: 1px solid #f1f5f9; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .badge-open { background: #dbeafe; color: #1d4ed8; }
    .badge-scheduled { background: #fef3c7; color: #b45309; }
    .badge-completed { background: #dcfce7; color: #15803d; }
    .badge-cancelled { background: #fee2e2; color: #b91c1c; }
    #error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }
  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <h1 id="login-title">Field Service</h1>
    <p id="login-slogan">Sign in to your dashboard</p>
    <div id="error-msg"></div>
    <input type="email" id="email-input" placeholder="Email address" />
    <input type="password" id="password-input" placeholder="Password" />
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="googleLogin()">Continue with Google</button>
  </div>
</div>
<div id="app">
  <nav>
    <div class="nav-brand">
      <span id="nav-company">Dashboard</span>
      <span class="trade-badge" id="nav-trade">TRADE</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="customers.html">Customers</a>
      <a href="dispatch.html">Dispatch</a>
      <a href="schedule.html">Schedule</a>
      <a href="team.html" id="nav-team-label">Team</a>
      <a href="pricebook.html">Pricebook</a>
      <a href="quote-invoice.html">Quotes &amp; Invoices</a>
    <a href="api-keys.html">API Keys</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user-name"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <main>
    <h2>Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Open Jobs</div><div class="value" id="stat-open">-</div></div>
      <div class="stat-card"><div class="label">Scheduled Today</div><div class="value" id="stat-today">-</div></div>
      <div class="stat-card"><div class="label">Completed This Month</div><div class="value" id="stat-completed">-</div></div>
      <div class="stat-card"><div class="label">Unpaid Invoices</div><div class="value" id="stat-unpaid">-</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>Recent Jobs</h3>
        <button class="btn-sm" onclick="location.href='dispatch.html'">View All</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Type</th><th id="tech-col">Technician</th><th>Status</th><th>Scheduled</th></tr></thead>
        <tbody id="jobs-tbody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:#94a3b8">Loading...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
<script>
const API='';let brand={};let token=localStorage.getItem('token');
const params=new URLSearchParams(window.location.search);
if(params.get('token')){localStorage.setItem('token',params.get('token'));token=params.get('token');window.history.replaceState({},'','index.html');}
async function loadBrand(){try{const r=await fetch(API+'/api/brand');brand=await r.json();document.title=brand.companyName+' - Dashboard';document.getElementById('login-title').textContent=brand.companyName;document.getElementById('login-slogan').textContent=brand.companySlogan||'Sign in to your dashboard';document.getElementById('nav-company').textContent=brand.companyName;document.getElementById('nav-trade').textContent=(brand.tradeType||'trade').toUpperCase();document.getElementById('nav-team-label').textContent=(brand.technicianLabel||'Technician')+'s';document.getElementById('tech-col').textContent=brand.technicianLabel||'Technician';if(brand.colors){const s=document.documentElement.style;if(brand.colors.primary)s.setProperty('--color-primary',brand.colors.primary);if(brand.colors.primaryDark)s.setProperty('--color-primary-dark',brand.colors.primaryDark);if(brand.colors.navBg)s.setProperty('--color-nav-bg',brand.colors.navBg);if(brand.colors.navText)s.setProperty('--color-nav-text',brand.colors.navText);if(brand.colors.accent)s.setProperty('--color-accent',brand.colors.accent);}}catch(e){console.warn('Brand load failed',e);}}
async function init(){await loadBrand();if(token){await showApp();}else{document.getElementById('login-screen').style.display='flex';}}
async function doLogin(){const email=document.getElementById('email-input').value;const pass=document.getElementById('password-input').value;const err=document.getElementById('error-msg');err.style.display='none';try{const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Login failed');localStorage.setItem('token',d.token);token=d.token;await showApp();}catch(e){err.textContent=e.message;err.style.display='block';}}
function googleLogin(){window.location.href=API+'/api/auth/google';}
function logout(){localStorage.removeItem('token');location.reload();}
async function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});if(!r.ok){logout();return;}const me=await r.json();document.getElementById('nav-user-name').textContent=me.name||me.email;loadStats();loadJobs();}
async function loadStats(){try{const r=await fetch(API+'/api/jobs',{headers:{Authorization:'Bearer '+token}});const jobs=await r.json();const today=new Date().toDateString();const month=new Date().getMonth();document.getElementById('stat-open').textContent=jobs.filter(j=>j.status==='open').length;document.getElementById('stat-today').textContent=jobs.filter(j=>j.scheduledDate&&new Date(j.scheduledDate).toDateString()===today).length;document.getElementById('stat-completed').textContent=jobs.filter(j=>j.status==='completed'&&new Date(j.updatedAt).getMonth()===month).length;const ir=await fetch(API+'/api/invoices',{headers:{Authorization:'Bearer '+token}});const invs=await ir.json();document.getElementById('stat-unpaid').textContent=invs.filter(i=>i.status!=='paid').length;}catch(e){console.warn(e);}}
async function loadJobs(){try{const r=await fetch(API+'/api/jobs?limit=10',{headers:{Authorization:'Bearer '+token}});const jobs=await r.json();const tb=document.getElementById('jobs-tbody');if(!jobs.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#94a3b8">No jobs yet.</td></tr>';return;}tb.innerHTML=jobs.map(j=>'<tr onclick="location.href='job.html?id='+j.id+''" style="cursor:pointer"><td>#'+j.id+'</td><td>'+(j.customer?j.customer.name:'-')+'</td><td>'+(j.jobType||'-')+'</td><td>'+(j.technician?j.technician.name:'-')+'</td><td><span class="badge badge-'+j.status+'">'+j.status+'</span></td><td>'+(j.scheduledDate?new Date(j.scheduledDate).toLocaleDateString():'-')+'</td></tr>').join('');}catch(e){document.getElementById('jobs-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#ef4444">Failed to load.</td></tr>';}}
init();
</script>
</body>
</html>
