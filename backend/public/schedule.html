<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule</title>
  <style>
    :root{--color-primary:#2563eb;--color-primary-dark:#1d4ed8;--color-nav-bg:#1e293b;--color-nav-text:#f1f5f9;--color-accent:#f59e0b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
    nav{background:var(--color-nav-bg);color:var(--color-nav-text);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
    .nav-brand{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:0.5rem;}
    .trade-badge{font-size:0.65rem;background:var(--color-accent);color:#1e293b;padding:2px 8px;border-radius:99px;font-weight:700;}
    .nav-links{display:flex;gap:1.5rem;font-size:0.9rem;}
    .nav-links a{color:#94a3b8;text-decoration:none;}
    .nav-links a:hover,.nav-links a.active{color:#fff;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-user{font-size:0.85rem;color:#94a3b8;}
    .btn-logout{background:none;border:1px solid #475569;color:#94a3b8;border-radius:6px;padding:0.3rem 0.75rem;cursor:pointer;font-size:0.8rem;}
    main{max-width:1200px;margin:2rem auto;padding:0 1.5rem;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem;}
    h2{font-size:1.4rem;}
    .week-nav{display:flex;align-items:center;gap:1rem;}
    .btn-nav{padding:0.4rem 0.9rem;background:#fff;border:1px solid #cbd5e1;border-radius:8px;cursor:pointer;font-size:0.875rem;}
    .btn-nav:hover{background:#f1f5f9;}
    .week-label{font-weight:600;font-size:0.95rem;min-width:200px;text-align:center;}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
    .day-header{background:#f8fafc;padding:0.75rem;text-align:center;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0;font-size:0.8rem;font-weight:600;color:#64748b;}
    .day-header:last-child{border-right:none;}
    .day-cell{min-height:140px;padding:0.5rem;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;vertical-align:top;}
    .day-cell:last-child{border-right:none;}
    .day-num{font-size:0.8rem;font-weight:600;color:#94a3b8;margin-bottom:0.4rem;}
    .day-num.today{color:var(--color-primary);}
    .job-chip{background:#dbeafe;color:#1d4ed8;border-radius:6px;padding:3px 7px;font-size:0.75rem;margin-bottom:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .job-chip:hover{background:#bfdbfe;}
    .job-chip.scheduled{background:#fef3c7;color:#b45309;}
    .job-chip.completed{background:#dcfce7;color:#15803d;}
    .no-jobs{font-size:0.75rem;color:#cbd5e1;}
    .filters{display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;}
    .filters select{padding:0.5rem 0.8rem;border:1px solid #cbd5e1;border-radius:8px;font-size:0.875rem;background:#fff;}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <span id="nav-company">Dashboard</span>
    <span class="trade-badge" id="nav-trade">TRADE</span>
  </div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="customers.html">Customers</a>
    <a href="dispatch.html">Dispatch</a>
    <a href="schedule.html" class="active">Schedule</a>
    <a href="team.html" id="nav-team-label">Team</a>
    <a href="pricebook.html">Pricebook</a>
    <a href="quote-invoice.html">Quotes &amp; Invoices</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user-name"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>
<main>
  <div class="page-header">
    <h2>Schedule</h2>
    <div class="week-nav">
      <button class="btn-nav" onclick="changeWeek(-1)">&larr; Prev</button>
      <span class="week-label" id="week-label">Week</span>
      <button class="btn-nav" onclick="changeWeek(1)">Next &rarr;</button>
      <button class="btn-nav" onclick="goToday()">Today</button>
    </div>
  </div>
  <div class="filters">
    <select id="tech-filter" onchange="renderCalendar()"><option value="">All <span id="tl">Technicians</span></option></select>
  </div>
  <div class="calendar-grid" id="calendar">
    <div class="day-header">Sun</div>
    <div class="day-header">Mon</div>
    <div class="day-header">Tue</div>
    <div class="day-header">Wed</div>
    <div class="day-header">Thu</div>
    <div class="day-header">Fri</div>
    <div class="day-header">Sat</div>
  </div>
</main>
<script>
const API='';let brand={};let token=localStorage.getItem('token');let allJobs=[];let weekOffset=0;
const today=new Date();today.setHours(0,0,0,0);
async function loadBrand(){try{const r=await fetch(API+'/api/brand');brand=await r.json();document.title=brand.companyName+' - Schedule';document.getElementById('nav-company').textContent=brand.companyName;document.getElementById('nav-trade').textContent=(brand.tradeType||'trade').toUpperCase();const tl=brand.technicianLabel||'Technician';document.getElementById('nav-team-label').textContent=tl+'s';if(brand.colors){const s=document.documentElement.style;if(brand.colors.primary)s.setProperty('--color-primary',brand.colors.primary);if(brand.colors.primaryDark)s.setProperty('--color-primary-dark',brand.colors.primaryDark);if(brand.colors.navBg)s.setProperty('--color-nav-bg',brand.colors.navBg);if(brand.colors.navText)s.setProperty('--color-nav-text',brand.colors.navText);if(brand.colors.accent)s.setProperty('--color-accent',brand.colors.accent);}}catch(e){console.warn(e);}}
function logout(){localStorage.removeItem('token');location.href='index.html';}
async function init(){await loadBrand();if(!token){location.href='index.html';return;}const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});if(!r.ok){location.href='index.html';return;}const me=await r.json();document.getElementById('nav-user-name').textContent=me.name||me.email;await loadTechnicians();await loadJobs();renderCalendar();}
async function loadTechnicians(){try{const r=await fetch(API+'/api/users/technicians',{headers:{Authorization:'Bearer '+token}});const techs=await r.json();const sel=document.getElementById('tech-filter');techs.forEach(t=>{sel.innerHTML+='<option value="'+t.id+'">'+t.name+'</option>';});}catch(e){console.warn(e);}}
async function loadJobs(){try{const r=await fetch(API+'/api/jobs',{headers:{Authorization:'Bearer '+token}});allJobs=(await r.json()).filter(j=>j.scheduledDate);}catch(e){console.warn(e);}}
function getWeekStart(){const d=new Date(today);const dow=d.getDay();d.setDate(d.getDate()-dow+(weekOffset*7));return d;}
function changeWeek(dir){weekOffset+=dir;renderCalendar();}
function goToday(){weekOffset=0;renderCalendar();}
function renderCalendar(){const ws=getWeekStart();const we=new Date(ws);we.setDate(we.getDate()+6);const opts={month:'short',day:'numeric'};document.getElementById('week-label').textContent=ws.toLocaleDateString(undefined,opts)+' - '+we.toLocaleDateString(undefined,opts);const techId=document.getElementById('tech-filter').value;const cal=document.getElementById('calendar');const headers=Array.from(cal.querySelectorAll('.day-header'));cal.innerHTML='';headers.forEach(h=>cal.appendChild(h));for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const cell=document.createElement('div');cell.className='day-cell';const isToday=d.toDateString()===today.toDateString();const dayNum=document.createElement('div');dayNum.className='day-num'+(isToday?' today':'');dayNum.textContent=d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});cell.appendChild(dayNum);const dayJobs=allJobs.filter(j=>{const jd=new Date(j.scheduledDate);jd.setHours(0,0,0,0);return jd.toDateString()===d.toDateString()&&(!techId||j.technicianId==techId);});if(dayJobs.length){dayJobs.forEach(j=>{const chip=document.createElement('div');chip.className='job-chip '+(j.status||'open');chip.textContent='#'+j.id+' '+(j.customer?j.customer.name:j.jobType||'Job');chip.title=j.jobType+' - '+(j.technician?j.technician.name:'Unassigned')+' - '+j.status;chip.onclick=()=>location.href='job.html?id='+j.id;cell.appendChild(chip);});}else{const empty=document.createElement('div');empty.className='no-jobs';empty.textContent='No jobs';cell.appendChild(empty);}cal.appendChild(cell);}}
init();
</script>
</body>
</html>
