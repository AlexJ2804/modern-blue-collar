<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers</title>
  <style>
    :root{--color-primary:#2563eb;--color-primary-dark:#1d4ed8;--color-nav-bg:#1e293b;--color-nav-text:#f1f5f9;--color-accent:#f59e0b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
    nav{background:var(--color-nav-bg);color:var(--color-nav-text);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
    .nav-brand{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:0.5rem;}
    .trade-badge{font-size:0.65rem;background:var(--color-accent);color:#1e293b;padding:2px 8px;border-radius:99px;font-weight:700;}
    .nav-links{display:flex;gap:1.5rem;font-size:0.9rem;}
    .nav-links a{color:#94a3b8;text-decoration:none;}
    .nav-links a:hover,.nav-links a.active{color:#fff;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-user{font-size:0.85rem;color:#94a3b8;}
    .btn-logout{background:none;border:1px solid #475569;color:#94a3b8;border-radius:6px;padding:0.3rem 0.75rem;cursor:pointer;font-size:0.8rem;}
    main{max-width:1200px;margin:2rem auto;padding:0 1.5rem;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
    h2{font-size:1.4rem;}
    .btn-primary{padding:0.5rem 1.1rem;background:var(--color-primary);color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;font-weight:600;}
    .search-bar{display:flex;gap:0.75rem;margin-bottom:1.25rem;}
    .search-bar input{flex:1;padding:0.6rem 0.9rem;border:1px solid #cbd5e1;border-radius:8px;font-size:0.9rem;}
    .search-bar select{padding:0.6rem 0.9rem;border:1px solid #cbd5e1;border-radius:8px;font-size:0.9rem;background:#fff;}
    .card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:0.75rem 1.5rem;text-align:left;font-size:0.875rem;}
    th{background:#f8fafc;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;}
    td{border-bottom:1px solid #f1f5f9;}
    tr:hover td{background:#f8fafc;cursor:pointer;}
    .empty{text-align:center;padding:3rem;color:#94a3b8;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:12px;padding:2rem;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .modal h3{font-size:1.1rem;margin-bottom:1.25rem;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:0.85rem;font-weight:600;color:#374151;margin-bottom:0.4rem;}
    .form-group input,.form-group select{width:100%;padding:0.6rem 0.9rem;border:1px solid #cbd5e1;border-radius:8px;font-size:0.9rem;}
    .modal-footer{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;}
    .btn-cancel{padding:0.5rem 1rem;background:#f1f5f9;color:#475569;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <span id="nav-company">Dashboard</span>
    <span class="trade-badge" id="nav-trade">TRADE</span>
  </div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="customers.html" class="active">Customers</a>
    <a href="dispatch.html">Dispatch</a>
    <a href="schedule.html">Schedule</a>
    <a href="team.html" id="nav-team-label">Team</a>
    <a href="pricebook.html">Pricebook</a>
    <a href="quote-invoice.html">Quotes &amp; Invoices</a>
    <a href="api-keys.html">API Keys</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user-name"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>
<main>
  <div class="page-header">
    <h2>Customers</h2>
    <button class="btn-primary" onclick="openModal()">+ New Customer</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search by name, phone, email..." oninput="filterCustomers()" />
    <select id="state-filter" onchange="filterCustomers()">
      <option value="">All States</option>
    </select>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Jobs</th></tr></thead>
      <tbody id="customers-tbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</main>

<!-- New Customer Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>New Customer</h3>
    <div class="form-group"><label>Name *</label><input type="text" id="f-name" placeholder="Full name" /></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="f-phone" placeholder="Phone number" /></div>
    <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="Email address" /></div>
    <div class="form-group"><label>Address</label><input type="text" id="f-address" placeholder="Street address" /></div>
    <div class="form-group"><label>City</label><input type="text" id="f-city" placeholder="City" /></div>
    <div class="form-group"><label>State</label><input type="text" id="f-state" placeholder="State" maxlength="2" /></div>
    <div class="form-group"><label>Zip</label><input type="text" id="f-zip" placeholder="ZIP code" /></div>
    <div class="form-group"><label>Notes</label><input type="text" id="f-notes" placeholder="Optional notes" /></div>
    <div id="modal-error" style="color:#ef4444;font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<script>
const API='';let brand={};let token=localStorage.getItem('token');let allCustomers=[];
async function loadBrand(){try{const r=await fetch(API+'/api/brand');brand=await r.json();document.title=brand.companyName+' - Customers';document.getElementById('nav-company').textContent=brand.companyName;document.getElementById('nav-trade').textContent=(brand.tradeType||'trade').toUpperCase();document.getElementById('nav-team-label').textContent=(brand.technicianLabel||'Technician')+'s';if(brand.defaultState){const opt=document.createElement('option');opt.value=brand.defaultState;opt.textContent=brand.defaultState;document.getElementById('state-filter').appendChild(opt);}if(brand.colors){const s=document.documentElement.style;if(brand.colors.primary)s.setProperty('--color-primary',brand.colors.primary);if(brand.colors.primaryDark)s.setProperty('--color-primary-dark',brand.colors.primaryDark);if(brand.colors.navBg)s.setProperty('--color-nav-bg',brand.colors.navBg);if(brand.colors.navText)s.setProperty('--color-nav-text',brand.colors.navText);if(brand.colors.accent)s.setProperty('--color-accent',brand.colors.accent);}}catch(e){console.warn(e);}}
function logout(){localStorage.removeItem('token');location.href='index.html';}
async function init(){await loadBrand();if(!token){location.href='index.html';return;}const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});if(!r.ok){location.href='index.html';return;}const me=await r.json();document.getElementById('nav-user-name').textContent=me.name||me.email;loadCustomers();}
async function loadCustomers(){try{const r=await fetch(API+'/api/customers',{headers:{Authorization:'Bearer '+token}});allCustomers=await r.json();renderCustomers(allCustomers);}catch(e){document.getElementById('customers-tbody').innerHTML='<tr><td colspan="5" class="empty" style="color:#ef4444">Failed to load customers.</td></tr>';}}
function renderCustomers(list){const tb=document.getElementById('customers-tbody');if(!list.length){tb.innerHTML='<tr><td colspan="5" class="empty">No customers yet.</td></tr>';return;}tb.innerHTML=list.map(c=>'<tr onclick="location.href='customer-detail.html?id='+c.id+''"><td>'+c.name+'</td><td>'+(c.phone||'-')+'</td><td>'+(c.email||'-')+'</td><td>'+(c.address?c.address+(c.city?', '+c.city:'')+(c.state?' '+c.state:''):'-')+'</td><td>'+(c._count?c._count.jobs||0:0)+'</td></tr>').join('');}
function filterCustomers(){const q=document.getElementById('search-input').value.toLowerCase();const st=document.getElementById('state-filter').value;const filtered=allCustomers.filter(c=>{const matchQ=!q||(c.name&&c.name.toLowerCase().includes(q))||(c.phone&&c.phone.includes(q))||(c.email&&c.email&&c.email.toLowerCase().includes(q));const matchSt=!st||c.state===st;return matchQ&&matchSt;});renderCustomers(filtered);}
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal-error').style.display='none';}
async function createCustomer(){const name=document.getElementById('f-name').value.trim();if(!name){showErr('Name is required');return;}const body={name,phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),address:document.getElementById('f-address').value.trim(),city:document.getElementById('f-city').value.trim(),state:document.getElementById('f-state').value.trim().toUpperCase(),zip:document.getElementById('f-zip').value.trim(),notes:document.getElementById('f-notes').value.trim()};try{const r=await fetch(API+'/api/customers',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)throw new Error(d.error||'Failed to create');closeModal();loadCustomers();}catch(e){showErr(e.message);}}
function showErr(msg){const el=document.getElementById('modal-error');el.textContent=msg;el.style.display='block';}
init();
</script>
</body>
</html>
